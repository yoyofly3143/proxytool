name: release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Build linux binaries
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          go mod download
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o proxytool-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o proxytool-linux-arm64 .

          sha256sum proxytool-linux-amd64 proxytool-linux-arm64 > checksums.txt

      # main 分支每次 push：更新/覆盖一个 nightly 预发布 Release（tag=nightly）
      - name: Publish nightly release (main only)
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: |
            proxytool-linux-amd64
            proxytool-linux-arm64
            checksums.txt
          body: |
            自动构建（nightly）。
            - 触发：每次 push 到 main
            - 平台：linux/amd64、linux/arm64
            - 校验：checksums.txt（sha256）

      # 打 v* 标签：发布正式 Release（tag=vX.Y.Z）
      - name: Publish versioned release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: |
            proxytool-linux-amd64
            proxytool-linux-arm64
            checksums.txt
          generateReleaseNotes: true
